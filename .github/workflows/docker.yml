# ─── Erebus — Docker Image CI/CD ─────────────────────────────────────────────
#
# Triggers:
#   - Manual: workflow_dispatch (with optional custom tag)
#   - Automatic: push of a version tag (e.g. v1.2.3)
#
# Image tags produced:
#   - Short SHA (first 6 chars): ghcr.io/<owner>/erebus:<sha6>
#   - "latest" on every push
#   - Version tag when triggered by a tag push: ghcr.io/<owner>/erebus:v1.2.3
# ─────────────────────────────────────────────────────────────────────────────

name: Docker Image CI/CD

on:
  # Manual trigger — optionally supply a custom image tag
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra image tag (leave empty to use SHA only)"
        required: false
        default: ""

  # Automatic trigger on semver tags
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/erebus

jobs:
  build-and-push:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Compute tags ──────────────────────────────────────────────────────
      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          SHA6="${GITHUB_SHA::6}"
          REGISTRY_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"

          TAGS="${REGISTRY_IMAGE}:${SHA6}"
          TAGS="${TAGS},${REGISTRY_IMAGE}:latest"

          # Tag push: also tag with the Git ref name (e.g. v1.2.3)
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            TAGS="${TAGS},${REGISTRY_IMAGE}:${{ github.ref_name }}"
          fi

          # Manual dispatch with explicit extra tag
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAGS="${TAGS},${REGISTRY_IMAGE}:${{ inputs.tag }}"
          fi

          echo "sha6=${SHA6}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      # ── 3. Set up QEMU (multi-arch support) ─────────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 4. Set up Docker Buildx ──────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Log in to GHCR ───────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Build & push ─────────────────────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=Erebus
            org.opencontainers.image.description=The ultimate AI agent powered by Agno
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.sha6 }}

      # ── 7. Summary ───────────────────────────────────────────────────────────
      - name: Write job summary
        run: |
          echo "## 🐳 Docker Image Published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Tags:**" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**SHA:** \`${{ github.sha }}\` (short: \`${{ steps.meta.outputs.sha6 }}\`)" >> "$GITHUB_STEP_SUMMARY"
