# ─── Erebus — Docker Compose ─────────────────────────────────────────────────
#
# Quick start:
#   1. Copy .env.example to .env and fill in your API keys
#   2. Run: docker compose up -d
#   3. Open http://localhost:8741
#
# The gateway runs everything in a single container:
#   - REST API at /api/
#   - Web UI at /
#   - Telegram bot at /telegram/ (if EREBUS_TELEGRAM_TOKEN is set)
#   - Teams bot at /api/messages (if EREBUS_TEAMS_APP_ID is set)
# ─────────────────────────────────────────────────────────────────────────────

services:
  erebus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erebus
    restart: unless-stopped
    ports:
      - "${EREBUS_API_PORT:-8741}:8741"
    volumes:
      - erebus-data:/data
    env_file:
      - .env
    environment:
      - EREBUS_DATA_DIR=/data
      - EREBUS_API_HOST=0.0.0.0
      - EREBUS_API_PORT=8741
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8741/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  erebus-data:
    driver: local
